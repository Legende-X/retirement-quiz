<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where Should You Retire? | Légende X</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --orange:  #efa016;
    --teal:    #0098b5;
    --navy:    #012a62;
    --dark:    #1a1a1a;
    --muted:   #7a7368;
    --rule:    #d8d0c4;
    --cream:   #faf8f4;
    --paper:   #f5f0e8;
    --gold-light: #e8d5a3;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: #011d45;
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--orange);
  }
  .site-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    text-decoration: none;
  }
  .site-tag {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--orange);
  }

  /* ── HERO ── */
  .hero {
    background: var(--navy);
    text-align: center;
    padding: 56px 24px 48px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 60% 40%, rgba(0,152,181,0.18) 0%, transparent 70%),
                radial-gradient(ellipse at 20% 80%, rgba(239,160,22,0.10) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-kicker {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 18px;
    display: block;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 400;
    font-style: italic;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .hero-title strong {
    font-style: normal;
    font-weight: 600;
    color: var(--orange);
  }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.05em;
    max-width: 480px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }
  .hero-rule {
    width: 48px;
    height: 2px;
    background: var(--teal);
    margin: 0 auto;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 24px 0;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar-bg {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
  }
  .progress-bar-fill {
    height: 3px;
    background: linear-gradient(90deg, var(--teal), var(--orange));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── QUIZ CARD ── */
  .quiz-wrap {
    max-width: 640px;
    margin: 32px auto 60px;
    padding: 0 24px;
  }

  .question-card {
    background: #fff;
    border: 1px solid var(--rule);
    border-top: 3px solid var(--teal);
    padding: 36px 36px 28px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 12px;
    display: block;
  }
  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 400;
    line-height: 1.4;
    color: var(--navy);
    margin-bottom: 28px;
  }

  .options-grid {
    display: grid;
    gap: 10px;
  }

  .option-btn {
    background: var(--cream);
    border: 1.5px solid var(--rule);
    padding: 14px 18px;
    text-align: left;
    cursor: pointer;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: var(--dark);
    line-height: 1.5;
    transition: all 0.2s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .option-btn:hover {
    border-color: var(--teal);
    background: #fff;
    color: var(--navy);
    transform: translateX(3px);
  }
  .option-btn.selected {
    border-color: var(--orange);
    background: #fff8ec;
    color: var(--navy);
  }
  .option-letter {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 1.5px solid var(--rule);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: var(--muted);
    transition: all 0.2s;
    margin-top: 1px;
  }
  .option-btn.selected .option-letter {
    background: var(--orange);
    border-color: var(--orange);
    color: #fff;
  }
  .option-btn:hover .option-letter {
    border-color: var(--teal);
    color: var(--teal);
  }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 24px;
  }
  .btn-next {
    background: var(--navy);
    color: #fff;
    border: none;
    padding: 12px 32px;
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-next.active {
    opacity: 1;
    pointer-events: all;
  }
  .btn-next.active:hover { background: var(--teal); }

  /* ── RESULT ── */
  .result-card {
    background: #fff;
    border: 1px solid var(--rule);
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }
  .result-header {
    background: var(--navy);
    padding: 36px 36px 28px;
    position: relative;
    overflow: hidden;
  }
  .result-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--orange), var(--teal));
  }
  .result-kicker {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
    display: block;
  }
  .result-country {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 7vw, 3.2rem);
    font-weight: 600;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .result-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: rgba(255,255,255,0.65);
  }
  .result-body {
    padding: 32px 36px;
  }
  .result-desc {
    font-size: 15px;
    line-height: 1.85;
    color: #2c2820;
    margin-bottom: 28px;
    border-left: 3px solid var(--orange);
    padding-left: 18px;
  }
  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--cream);
    border: 1px solid var(--rule);
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--teal);
    display: block;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--navy);
  }
  .result-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .badge {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid var(--rule);
    color: var(--muted);
    background: var(--cream);
  }
  .badge.highlight {
    background: var(--navy);
    color: var(--gold-light);
    border-color: var(--navy);
  }

  .result-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-retake {
    flex: 1;
    background: transparent;
    border: 1.5px solid var(--navy);
    color: var(--navy);
    padding: 12px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 140px;
  }
  .btn-retake:hover { background: var(--navy); color: #fff; }

  .btn-share {
    flex: 1;
    background: var(--orange);
    border: 1.5px solid var(--orange);
    color: #fff;
    padding: 12px 20px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 140px;
  }
  .btn-share:hover { background: var(--teal); border-color: var(--teal); }

  .result-footer {
    border-top: 1px solid var(--rule);
    padding: 16px 36px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
  .result-footer a {
    color: var(--teal);
    text-decoration: none;
  }

  /* ── FOOTER ── */
  .site-footer {
    border-top: 1px solid var(--rule);
    padding: 28px 32px;
    text-align: center;
    background: var(--paper);
  }
  .footer-brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .footer-link {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal);
    text-decoration: none;
  }

  @media (max-width: 520px) {
    .question-card, .result-body { padding: 24px 20px; }
    .result-header { padding: 28px 20px 22px; }
    .result-stats { grid-template-columns: 1fr; }
    .result-footer { padding: 14px 20px; }
  }
</style>
</head>

// ── State ───────────────────────────────────────────────────────────────────
let current = 0;
let selected = null;
let scores = { PT:0, GR:0, ES:0, MY:0, CR:0, TH:0, MU:0, VN:0 };

// ── Render question ──────────────────────────────────────────────────────────
function renderQuestion() {
  const q = questions[current];
  const letters = ['A','B','C','D'];

  document.getElementById('q-number').textContent =
    `Question ${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-label').textContent =
    `Question ${current+1} of ${questions.length}`;
  document.getElementById('q-pct').textContent =
    Math.round((current / questions.length) * 100) + '%';
  document.getElementById('progress-fill').style.width =
    (current / questions.length * 100) + '%';

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => selectOption(i, btn);
    grid.appendChild(btn);
  });

  selected = null;
  document.getElementById('btn-next').classList.remove('active');

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectOption(index, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = index;
  document.getElementById('btn-next').classList.add('active');
}

function nextQuestion() {
  if (selected === null) return;

  // Add scores
  const optScores = questions[current].options[selected].scores;
  for (const [k, v] of Object.entries(optScores)) {
    scores[k] = (scores[k] || 0) + v;
  }

  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  // Find winner
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const p = profiles[winner];

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('q-label').textContent = 'Complete!';
  document.getElementById('q-pct').textContent = '100%';

  const wrap = document.getElementById('quiz-wrap');
  wrap.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="result-kicker">Your Retirement Match</span>
        <div class="result-country">${p.flag} ${p.name}</div>
        <div class="result-tagline">${p.tagline}</div>
      </div>
      <div class="result-body">
        <p class="result-desc">${p.desc}</p>
        <div class="result-stats">
          <div class="stat-box">
            <span class="stat-label">Monthly Budget</span>
            <span class="stat-value">${p.budget}</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Savings Needed (20–25 yrs)</span>
            <span class="stat-value">${p.savings}</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Visa Pathway</span>
            <span class="stat-value" style="font-size:0.95rem">${p.visa}</span>
          </div>
          <div class="stat-box">
            <span class="stat-label">Best For</span>
            <span class="stat-value" style="font-size:0.95rem">Budget · Safety · Lifestyle</span>
          </div>
        </div>
        <div class="result-badges">
          ${p.highlights.map((h,i) =>
            `<span class="badge${i===0?' highlight':''}">${h}</span>`
          ).join('')}
        </div>
        <div class="result-actions">
          <button class="btn-retake" onclick="retake()">&#8635; Retake Quiz</button>
          <button class="btn-share" onclick="share('${p.name}')">Share My Result</button>
        </div>
      </div>
      <div class="result-footer">
        Read the full guide at
        <a href="https://newsletter.legendex.world/">newsletter.legendex.world</a>
        &nbsp;·&nbsp; Légende X Chronicles · 2026
      </div>
    </div>
  `;
}

function retake() {
  current = 0;
  selected = null;
  scores = { PT:0, GR:0, ES:0, MY:0, CR:0, TH:0, MU:0, VN:0 };
  document.getElementById('quiz-wrap').innerHTML = `
    <div class="question-card" id="question-card">
      <span class="q-number" id="q-number"></span>
      <p class="q-text" id="q-text"></p>
      <div class="options-grid" id="options-grid"></div>
      <div class="nav-row">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next &rarr;</button>
      </div>
    </div>
  `;
  renderQuestion();
}

function share(country) {
  const text = `I just found out I should retire in ${country}! 🌍 Take the quiz at newsletter.legendex.world`;
  if (navigator.share) {
    navigator.share({ title: 'My Retirement Match — Légende X', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + '\n' + window.location.href)
      .then(() => alert('Copied to clipboard! Share it with someone who needs this quiz.'));
  }
}

renderQuestion();
</script>
